  }

  }
  .stars { color: #F5C842; font-size: 16px; letter-spacing: 4px; display: block; margin-bottom: 2px; }

  .container { width: 100%; max-width: 760px; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .counter { font-size: 13px; color: #999; font-weight: 500; }
  .navbtns { display: flex; gap: 8px; }
  button {
    background: white;
    border: 1.5px solid #e0ddd8;
    border-radius: 10px;
    padding: 9px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    color: #333;
    transition: background .12s, transform .08s;
  }
  button:hover { background: #f0ede8; }
  button:active { transform: scale(.97); }
  .btn-shuffle {
    font-size: 12px;
    color: #888;
    border-color: #ddd;
    padding: 7px 14px;
  }

  /* CARD */
  .card {
    background: white;
    border: 1px solid #e8e5e0;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(0,0,0,.06);
  }

  .card-header {
    padding: 14px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,.4);
  }
  .card-header .label {
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    font-weight: 700;
  }
  .reveal-area { display: flex; align-items: center; gap: 10px; }
  .word-display {
    background: rgba(255,255,255,.6);
    border: 1.5px solid rgba(0,0,0,.12);
    border-radius: 10px;
    padding: 6px 18px;
    font-size: 21px;
    font-weight: 800;
    color: #111;
    display: none;
    letter-spacing: -.3px;
  }
  .word-display.visible { display: block; }
  .btn-reveal {
    font-size: 12px;
    padding: 7px 16px;
    border-radius: 10px;
    background: rgba(255,255,255,.55);
    border: 1.5px solid rgba(0,0,0,.18);
    font-weight: 700;
    color: #222;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-reveal:hover { background: rgba(255,255,255,.85); }

  /* BODY */
  .card-body { display: flex; min-height: 240px; }

  .illus-pane {
    width: 220px;
    min-width: 220px;
    background: #f5f2ed;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 22px 16px;
    border-right: 1px solid #ede9e3;
  }
  .illus-pane svg { width: 170px; height: 170px; display: block; }

  .meaning-pane {
    flex: 1;
    padding: 30px 28px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 16px;
  }
  .meaning-label {
    font-size: 10px;
    color: #bbb;
    letter-spacing: .14em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .meaning-text {
    font-size: 20px;
    line-height: 1.65;
    color: #1a1a1a;
    font-weight: 400;
  }
  .cat-badge {
    display: inline-block;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    background: #f0ede8;
    color: #999;
    border: 1px solid #e5e0da;
    width: fit-content;
    font-weight: 500;
  }

    border-top: 1px solid #f0ede8;
    padding: 12px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .progress-wrap {
    flex: 1;
    height: 5px;
    background: #f0ede8;
    border-radius: 3px;
    overflow: hidden;
    margin-right: 16px;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .35s ease;
  }
  .hint-text {
    font-size: 11px;
    color: #ccc;
    white-space: nowrap;
  }

  .bottom-row {
    display: flex;
    justify-content: center;
    margin-top: 14px;
    gap: 10px;
  }
</style>
</head>

let current = 0;
let revealed = false;
let order = WORDS.map((_, i) => i);

function shuffle() {
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  current = 0;
  showCard();
}

function goTo(idx) {
  current = idx;
  showCard();
}

function showCard() {
  revealed = false;
  const w = WORDS[order[current]];

  document.getElementById('illus-pane').innerHTML = w.svg;
  document.getElementById('meaning-text').textContent = w.meaning;
  document.getElementById('cat-badge').textContent = w.category;
  document.getElementById('word-display').textContent = w.word;
  document.getElementById('word-display').classList.remove('visible');
  document.getElementById('btn-reveal').textContent = 'Toon woord';
  document.getElementById('counter').textContent = `${current + 1} / ${WORDS.length}`;

  const pct = ((current + 1) / WORDS.length) * 100;
  const fill = document.getElementById('progress-fill');
  fill.style.width = pct + '%';
  fill.style.background = w.color === 'pink' ? '#F5C6D0' : '#B8E0EC';

  const hdr = document.getElementById('card-header');
  hdr.style.background = w.color === 'pink' ? '#F5C6D0' : '#B8E0EC';
  hdr.style.borderBottom = w.color === 'pink'
    ? '1px solid rgba(212,83,126,0.2)'
    : '1px solid rgba(91,168,192,0.2)';

  const lbl = document.getElementById('header-label');
  lbl.style.color = w.color === 'pink' ? '#7a3a48' : '#1a4d5e';
}

function toggleReveal() {
  revealed = !revealed;
  document.getElementById('word-display').classList.toggle('visible', revealed);
  document.getElementById('btn-reveal').textContent = revealed ? 'Verberg woord' : 'Toon woord';
}

function next() {
  if (current < WORDS.length - 1) { current++; showCard(); }
}

function prev() {
  if (current > 0) { current--; showCard(); }
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') next();
  if (e.key === 'ArrowLeft') prev();
  if (e.key === ' ') { e.preventDefault(); toggleReveal(); }
});

showCard();
</script>
